# Copy this into .github/workflows/star-history.yml in your repo.
name: Star History

on:
  # Recommended: a scheduled run every 3h, 6h, or once a day. Star counts move
  # slowly, so anything more frequent just burns CI minutes. Pick one:
  #   3h    -> '0 */3 * * *'
  #   6h    -> '0 */6 * * *'   (default below)
  #   12h   -> '0 */12 * * *'
  #   daily -> '0 0 * * *'
  # Do NOT use the 5-minute cron ('*/5 * * * *') except for a quick test, and
  # do NOT add a `push` trigger: both re-run the job far more than star data
  # changes and add commit churn for no benefit.
  schedule:
    - cron: '0 */6 * * *'
  # Manual run button (use this for the very first run).
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so two of them never race on the same git push.
concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: narayann7/star-history-action@v1
        with:
          repos: fossui/fossui   # or ${{ github.repository }} for the current repo
          # token defaults to the automatic Actions token; override with a PAT
          # secret if the default lacks stargazers access:
          # token: ${{ secrets.GH_PAT }}
