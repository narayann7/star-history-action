# Dogfood: run the action on this repo. Doubles as the end-to-end test.
# Follows our own guidance: a scheduled cadence plus a manual button, no push
# trigger and no sub-hourly cron.
name: Star History

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          repos: fossui/fossui   # dogfood on the repo from the motivating issue
