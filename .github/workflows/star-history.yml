# Dogfood: this repo runs its own published action on itself, the normal way a
# consumer would. Charting our own repo, so the default github.token is enough
# (no PAT). Scheduled cadence plus a manual button, no push trigger.
name: Star History

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
