# Dogfood: run the action on this repo. Doubles as the end-to-end test and
# exercises the commit-loop guard.
name: Star History

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/star-history/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so two of them never race on the same git push.
concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          repos: ${{ github.repository }}
