# Dogfood: this repo runs its own published action on itself, the normal way a
# consumer would. Charting our own repo, so the default github.token is enough
# (no PAT). Runs on a new star and on manual dispatch. Note: with no schedule,
# the chart will not refresh on quiet days or pick up unstars.
name: Star History

on:
  watch:
    types: [started]   # dogfood: refresh the chart when this repo gets a new star
  workflow_dispatch:

permissions:
  contents: write

# Collapse a burst of stars into a single refresh. cancel-in-progress: true means
# a new star cancels an in-flight/queued run instead of queuing another, so N
# near-simultaneous stars cost one run, not N. This matters because the automatic
# Actions token is capped at 1000 API requests/hour per repo and each render
# spends ~40; without collapsing, a star burst drains the quota and later runs
# 403. The chart still ends up current because the surviving run reads live data.
concurrency:
  group: star-history
  cancel-in-progress: true

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          # Chart this repo itself and keep its README chart current.
          repos: ${{ github.repository }}
