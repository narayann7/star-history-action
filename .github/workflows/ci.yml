name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml is parseable
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml')); print('action.yml OK')"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install renderer dependencies
        run: npm ci --prefix renderer --no-audit --no-fund

      # Render a chart for this repo to confirm the vendored renderer works end
      # to end. github.token can read its own repo's stargazers. A fresh repo may
      # have zero stars, which still produces a valid SVG, so we only assert the
      # file is non-empty and looks like SVG.
      - name: Smoke-test the renderer
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          renderer/node_modules/.bin/tsx renderer/render.ts \
            --repos "${{ github.repository }}" \
            --theme light --type Date --width 800 \
            --output /tmp/smoke.svg \
            --png /tmp/smoke.png
          test -s /tmp/smoke.svg
          grep -qi '<svg' /tmp/smoke.svg
          test -s /tmp/smoke.png
          head -c 4 /tmp/smoke.png | od -An -tx1 | tr -d ' \n' | grep -qi '89504e47'
          echo "renderer smoke test OK"

      # Exercise the full shell flow (render-charts.sh + readme-embed.py) the way
      # action.yml runs it: change detection, stable filenames, PNG, backward
      # compat regeneration, both embed formats, and commit-ability.
      - name: Integration test
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash tests/test-integration.sh

      # Static-string checks: stable naming, no timestamped output, png wiring.
      - name: Stable-name checks
        run: bash tests/test-stable-names.sh

      # Google Fonts fetch module: downloads a real TTF, reads its family name,
      # and checks the throw-on-failure paths. Network only, no token needed.
      - name: Font-fetch unit test
        run: renderer/node_modules/.bin/tsx renderer/googleFont.test.ts

      # Retry interceptor: rate-limit 403 detection, backoff math, and the
      # end-to-end retry loop against a mocked axios adapter. No network.
      - name: Retry unit test
        run: renderer/node_modules/.bin/tsx renderer/retry.test.ts

      # font-family end to end: PNG renders with a Google font, a bad name falls
      # back to the bundled font without failing, empty input skips the fetch,
      # and the font is part of the change signature.
      - name: Font feature tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash tests/test-font.sh
          bash tests/test-font-plumbing.sh
