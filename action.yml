name: 'Star History Action'
description: 'Render a self-updating star history chart and commit it into your README. Unofficial star-history helper action.'
author: 'narayann7'

branding:
  icon: 'star'
  color: 'yellow'

inputs:
  repos:
    description: 'Comma-separated owner/repo list. Defaults to the current repository. Only repos the token owns or collaborates on will work.'
    required: false
    default: ${{ github.repository }}
  output-dir:
    description: 'Directory where generated SVGs are written.'
    required: false
    default: 'assets/star-history'
  token:
    description: 'GitHub token used for the stargazers API. Defaults to the automatic Actions token. Supply a PAT secret if the default lacks access.'
    required: false
    default: ${{ github.token }}
  type:
    description: 'Chart mode: Date or Timeline.'
    required: false
    default: 'Date'
  themes:
    description: 'Comma-separated themes to render: light, dark.'
    required: false
    default: 'light,dark'
  width:
    description: 'Image width in pixels.'
    required: false
    default: '800'
  update-readme:
    description: 'Rewrite the README between the star-history marker comments to point at the newest chart. Requires the markers to exist.'
    required: false
    default: 'true'
  readme:
    description: 'Path to the README to update when update-readme is true.'
    required: false
    default: 'README.md'
  readme-format:
    description: 'README embed style: "picture" (SVG <picture>, GitHub dark/light) or "png" (plain-markdown absolute-URL PNG, renders on npm/pub.dev).'
    required: false
    default: 'picture'
  commit:
    description: 'Whether to commit and push the generated files.'
    required: false
    default: 'true'
  commit-message:
    description: 'Commit message used when committing generated files.'
    required: false
    default: 'chore: update star history [skip ci]'

outputs:
  files:
    description: 'Newline-separated list of generated SVG file paths.'
    value: ${{ steps.render.outputs.files }}
  changed:
    description: 'Whether the chart changed this run (true/false).'
    value: ${{ steps.render.outputs.changed }}
  light:
    description: 'Path to the newest light-theme SVG (or the first theme).'
    value: ${{ steps.render.outputs.light }}
  dark:
    description: 'Path to the newest dark-theme SVG, if a dark theme was rendered.'
    value: ${{ steps.render.outputs.dark }}
  png:
    description: 'Path to the generated PNG chart (single file, rendered from the first configured theme).'
    value: ${{ steps.render.outputs.png }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install renderer dependencies
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: npm ci --prefix "$ACTION_PATH/renderer" --no-audit --no-fund

    - name: Render star history charts
      id: render
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPOS: ${{ inputs.repos }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        TYPE: ${{ inputs.type }}
        THEMES: ${{ inputs.themes }}
        WIDTH: ${{ inputs.width }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        if [ -z "${GITHUB_TOKEN:-}" ]; then
          echo "::error::token input is empty. Provide a GitHub token with access to the target repos."
          exit 1
        fi

        R="$ACTION_PATH/renderer"
        mkdir -p "$OUTPUT_DIR"
        TMP="$(mktemp -d)"

        # Collect trimmed, validated theme names. Themes are used in file paths
        # and delete globs, so restrict them to a safe charset to prevent path
        # traversal or glob collisions.
        themes=()
        IFS=',' read -ra THEME_LIST <<< "$THEMES"
        for raw_theme in "${THEME_LIST[@]}"; do
          # Trim leading/trailing whitespace with pure bash (no word splitting).
          theme="${raw_theme#"${raw_theme%%[![:space:]]*}"}"
          theme="${theme%"${theme##*[![:space:]]}"}"
          [ -z "$theme" ] && continue
          if ! [[ "$theme" =~ ^[a-z0-9]+$ ]]; then
            echo "::error::Invalid theme name '$theme'. Themes must match [a-z0-9]."
            exit 1
          fi
          themes+=("$theme")
        done

        if [ "${#themes[@]}" -eq 0 ]; then
          echo "::error::No valid themes in input '$THEMES'."
          exit 1
        fi

        # Change detection is by star data, not rendered pixels: the SVG has
        # sub-pixel float jitter every run, so comparing SVGs would always look
        # changed. render.ts writes a signature over the star data (day-level
        # dates + counts). We render the first theme as a probe, compare its
        # signature to the stored one, and only continue if it moved.
        probe="${themes[0]}"
        SIGFILE="$OUTPUT_DIR/.star-history.sig"
        echo "Rendering $REPOS ($probe) as change probe"
        # The token is passed via the GITHUB_TOKEN env var (set on this step),
        # not on argv, so it does not appear in the process list.
        "$R/node_modules/.bin/tsx" "$R/render.ts" \
          --repos "$REPOS" \
          --theme "$probe" \
          --type "$TYPE" \
          --width "$WIDTH" \
          --output "$TMP/$probe.svg" \
          --png "$TMP/star-history.png" \
          --signature "$TMP/new.sig"

        if [ ! -s "$TMP/$probe.svg" ]; then
          echo "::error::Rendered SVG is empty for theme $probe"
          exit 1
        fi

        newsig="$(cat "$TMP/new.sig")"
        oldsig="$(cat "$SIGFILE" 2>/dev/null || true)"

        # Backward compat: a repo upgrading from the old timestamped naming has a
        # matching signature but no stable files yet. Only skip when the data is
        # unchanged AND every stable target already exists.
        have_stable=true
        for theme in "${themes[@]}"; do
          [ -f "$OUTPUT_DIR/star-history-$theme.svg" ] || have_stable=false
        done
        [ -f "$OUTPUT_DIR/star-history.png" ] || have_stable=false

        if [ -n "$oldsig" ] && [ "$newsig" = "$oldsig" ] && [ "$have_stable" = true ]; then
          echo "No star history change and stable files present; keeping existing charts."
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ "$have_stable" != true ]; then
          echo "Stable chart files missing (first run or upgrade from timestamped naming); regenerating."
        fi

        # Changed: render the remaining themes too.
        for theme in "${themes[@]}"; do
          [ "$theme" = "$probe" ] && continue
          echo "Rendering $REPOS ($theme)"
          "$R/node_modules/.bin/tsx" "$R/render.ts" \
            --repos "$REPOS" \
            --theme "$theme" \
            --type "$TYPE" \
            --width "$WIDTH" \
            --output "$TMP/$theme.svg"
          if [ ! -s "$TMP/$theme.svg" ]; then
            echo "::error::Rendered SVG is empty for theme $theme"
            exit 1
          fi
        done

        # Changed: write stable, overwrite-in-place filenames. External
        # consumers (npm, pub.dev) freeze the README URL, so a moving filename
        # 404s once the old file is deleted. A fixed path is always valid; the
        # main-repo README still refreshes because a push purges GitHub's image
        # cache.
        light=""
        dark=""
        files=""
        for theme in "${themes[@]}"; do
          final="$OUTPUT_DIR/star-history-$theme.svg"
          cp "$TMP/$theme.svg" "$final"
          [ "$theme" = "light" ] && light="$final"
          [ "$theme" = "dark" ] && dark="$final"
          files="${files}${final}"$'\n'
        done
        # If no explicit "light" theme, use the first theme as the <img> source.
        [ -z "$light" ] && light="$OUTPUT_DIR/star-history-${themes[0]}.svg"

        # Single PNG (follows the probe/first theme) for registries that cannot
        # render SVG.
        png="$OUTPUT_DIR/star-history.png"
        cp "$TMP/star-history.png" "$png"
        files="${files}${png}"$'\n'

        # Persist the new signature so the next run can detect no-change.
        cp "$TMP/new.sig" "$SIGFILE"

        echo "changed=true" >> "$GITHUB_OUTPUT"
        echo "light=$light" >> "$GITHUB_OUTPUT"
        echo "dark=$dark" >> "$GITHUB_OUTPUT"
        echo "png=$png" >> "$GITHUB_OUTPUT"
        {
          echo "files<<STAR_HISTORY_EOF"
          printf '%s' "$files"
          echo "STAR_HISTORY_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Update README embed
      if: ${{ inputs.update-readme == 'true' && steps.render.outputs.changed == 'true' }}
      shell: bash
      env:
        README: ${{ inputs.readme }}
        LIGHT: ${{ steps.render.outputs.light }}
        DARK: ${{ steps.render.outputs.dark }}
        PNG: ${{ steps.render.outputs.png }}
        README_FORMAT: ${{ inputs.readme-format }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        python3 "$ACTION_PATH/readme-embed.py"

    - name: Commit generated charts
      if: ${{ inputs.commit == 'true' && steps.render.outputs.changed == 'true' }}
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        README: ${{ inputs.readme }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add "$OUTPUT_DIR" "$README" 2>/dev/null || git add "$OUTPUT_DIR"
        if git diff --cached --quiet; then
          echo "No staged changes to commit."
          exit 0
        fi

        git commit -m "$COMMIT_MESSAGE"

        # Rebase onto any commits that landed while this run was working, so the
        # push does not fail with a non-fast-forward error.
        branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "$branch" = "HEAD" ]; then
          echo "::error::Detached HEAD; cannot push. Trigger this action on push/schedule/workflow_dispatch (not pull_request)."
          exit 1
        fi
        if ! git pull --rebase origin "$branch"; then
          echo "::error::Rebase onto origin/$branch failed. Aborting rather than pushing an inconsistent state."
          git rebase --abort 2>/dev/null || true
          exit 1
        fi
        git push origin "HEAD:$branch"
